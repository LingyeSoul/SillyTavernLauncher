name: Build Windows Flet App

on:
  push:
    branches:
      - main
  release:
    types: [created]

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      GITHUB_RUNNER_MIN_VERSION: 2.297.0
      ACTIONS_CORE_MIN_VERSION: 1.10.0
    
    steps:
      - name: Check runner version
        if: runner.self_hosted
        shell: bash
        run: |
          RUNNER_VERSION=$(cat /home/runner/.version)
          if [[ "$(printf '%s\n' "$GITHUB_RUNNER_MIN_VERSION" "$RUNNER_VERSION" | sort -V | head -n1)" != "$GITHUB_RUNNER_MIN_VERSION" ]]; then
            echo "自托管运行器版本过低，需要 $GITHUB_RUNNER_MIN_VERSION 或更高"
            exit 1
          fi
          echo "自托管运行器版本检查通过: $RUNNER_VERSION"
      
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup GitVersion
        uses: gittools/actions/gitversion/setup@v0.9.13
        with:
          versionSpec: '5.x'
      
      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v0.9.13
      
      - name: Extract version info (using environment files)
        id: extract_version
        shell: bash
        run: |
          echo "SEMVER=${{ steps.gitversion.outputs.SemVer }}" >> $GITHUB_ENV
          echo "MAJOR=${{ steps.gitversion.outputs.Major }}" >> $GITHUB_ENV
          echo "MINOR=${{ steps.gitversion.outputs.Minor }}" >> $GITHUB_ENV
          echo "PATCH=${{ steps.gitversion.outputs.Patch }}" >> $GITHUB_ENV
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install Flet and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet pyinstaller
      
      - name: Package application with auto version
        run: |
          flet pack src/main.py `
            --icon src/assets/icon.ico `
            --name SillyTavernLauncher `
            --product-name "酒馆启动器" `
            --file-description "SillyTavernLauncher酒馆启动器" `
            --product-version "${{ env.SEMVER }}" `
            --file-version "${{ env.MAJOR }}.${{ env.MINOR }}.${{ env.PATCH }}.0" `
            --company-name "LingyeSoul" `
            --copyright "Copyright (c) 2025 LingyeSoul" `
            --yes
        shell: powershell
      
      - name: Create Release (if on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
          tag_name: v${{ env.SEMVER }}
          name: Release v${{ env.SEMVER }}
          body: |
            酒馆启动器 v${{ env.SEMVER }} 发布!
            自动生成的版本说明。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: SillyTavernLauncher-windows-v${{ env.SEMVER }}
          path: dist/
