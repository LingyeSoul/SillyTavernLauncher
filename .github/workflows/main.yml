name: Build Windows Flet App

on:
  push:
    branches:
      - main
  release:
    types: [created]

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      GITHUB_RUNNER_MIN_VERSION: 2.297.0
      ACTIONS_CORE_MIN_VERSION: 1.10.0
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup GitVersion
        uses: gittools/actions/gitversion/setup@v0.9.13
        with:
          versionSpec: '5.x'

      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v0.9.13

      - name: Capture version outputs
        shell: bash
        run: |
          echo "SEMVER=${{ steps.gitversion.outputs.SemVer }}" >> $GITHUB_ENV
          echo "MAJOR=${{ steps.gitversion.outputs.Major }}" >> $GITHUB_ENV
          echo "MINOR=${{ steps.gitversion.outputs.Minor }}" >> $GITHUB_ENV
          echo "PATCH=${{ steps.gitversion.outputs.Patch }}" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Flet and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet pyinstaller

      - name: Package application with auto version
        run: |
          flet pack src/main.py `
            --icon src/assets/icon.ico `
            --name SillyTavernLauncher `
            --product-name "酒馆启动器" `
            --file-description "SillyTavernLauncher酒馆启动器" `
            --product-version "${{ env.SEMVER }}" `
            --file-version "${{ env.MAJOR }}.${{ env.MINOR }}.${{ env.PATCH }}.0" `
            --company-name "LingyeSoul" `
            --copyright "Copyright (c) 2025 LingyeSoul" `
            --onedir `
            --distpath dist `
            --yes
        shell: powershell

      - name: Check dist directory contents
        run: |
          $files = Get-ChildItem -Path dist -Recurse
          if ($files.Count -eq 0) { exit /b 1 }
        shell: powershell

      - name: Compress dist to ZIP
        run: |
          $version = $env:SEMVER
          $zipName = "SillyTavernLauncher-win-v$version.zip"
          Compress-Archive -Path dist\* -DestinationPath $zipName -Force
          echo "ZIP_PATH=$zipName" >> $GITHUB_ENV
        shell: powershell

      - name: Create Release (if on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.ZIP_PATH }}  # 直接上传ZIP文件
          tag_name: v${{ env.SEMVER }}
          name: Release v${{ env.SEMVER }}
          body: |
            酒馆启动器 v${{ env.SEMVER }} 发布!
            包含Windows可执行文件及依赖项。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: SillyTavernLauncher-windows-v${{ env.SEMVER }}
          path: ${{ env.ZIP_PATH }}
